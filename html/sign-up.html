<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join</title>

    <!-- adding Favicon-->
    <link rel="icon" type="image/x-icon" href="../assets/Favicon/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/Favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/Favicon/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/Favicon/apple-touch-icon.png"
    />
    <link rel="manifest" href="../assets/Favicon/site.webmanifest" />

    <!-- adding Main CSS Style-Sheet -->
    <link rel="stylesheet" href="../css/standard.css" />
    <link rel="stylesheet" href="../css/sign-up-style.css" />
    <link rel="stylesheet" href="../css/sign-up-responsiv.css" />

    <!-- adding Font Awesome -->
    <script
      src="https://kit.fontawesome.com/34f17cdf39.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body id="sign-up-body">
    <header id="sign-up-header">
      <img class="header-img" src="../assets/img/Capa 2.svg" alt="Join-logo" />
    </header>

    <main id="sign-up-main-page">
      <div class="content">
        <div class="signup-container">
          <div class="back-arrow" id="back-arrow" onclick="goBackToLogin()">
            <svg
              viewBox="0 0 21 20"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M4.27563 8.48509H19.1716C19.908 8.48509 20.505 9.08204 20.505 9.81842C20.505 10.5548 19.908 11.1518 19.1716 11.1518H4.27563L10.485 17.3611C11.0056 17.8817 11.0056 18.7258 10.485 19.2464C9.96434 19.767 9.12025 19.767 8.59963 19.2464L0.585843 11.2326C-0.195206 10.4516 -0.195204 9.18526 0.585844 8.40421L8.59963 0.39042C9.12025 -0.130201 9.96434 -0.1302 10.485 0.39042C11.0056 0.911041 11.0056 1.75513 10.485 2.27575L4.27563 8.48509Z"
                fill="#29ABE2"
              />
            </svg>
          </div>
          <div class="signup-heading">
            <h1>Sign up</h1>
            <div class="seperator"></div>
          </div>
          <form id="signupForm">
            <div class="input-icon">
              <input
                type="text"
                id="signup-name"
                placeholder="Name"
                onblur="nameValidation()"
              />
              <i class="fa-regular fa-user"></i>
            </div>

            <!-- Name Error Message-->

            <div class="error-message" id="name-error-message">
              Name shall not be empty.
            </div>

            <div class="input-icon">
              <input
                type="email"
                id="signup-email"
                placeholder="Email"
                onblur="emailValidation()"
              />
              <i class="fa-regular fa-envelope"></i>
            </div>

            <!-- Email Error Message-->

            <div class="error-message" id="email-error-message">
              Email shall not be empty.
            </div>

            <div class="input-icon">
              <input
                type="password"
                id="signup-password"
                placeholder="Passwort"
                onblur="passwordValidation()"
              />
              <div id="icon_password_switch_main" class="input-icon-div-switch">
                <i class="fa-solid fa-lock"></i>
              </div>
            </div>

            <!-- Password Error Message-->

            <div class="error-message" id="password-error-message">
              Password should contain atleast 6 characters.
            </div>

            <div class="input-icon" id="confirm-password-container">
              <input
                type="password"
                id="signup-confirm-password"
                placeholder="Confirm Passwort"
                oninput="confirmPasswordValidation()"
                onblur="nullConfirmationPasswordValidation()"
              />

              <div
                id="icon_password_switch_confirm"
                class="input-icon-div-switch"
              >
                <i class="fa-solid fa-lock"></i>
              </div>
            </div>

            <!-- Confirm Password Error Message-->

            <div class="error-message" id="confirmpassword-error-message">
              Your passwords don't match. Please try again.
            </div>
            <div class="checkbox-group">
              <input
                type="checkbox"
                id="privacy"
                name="privacy-policy"
                required
              />

              <label for="privacy" id="privacy-policy">
                <span class="checkbox-icon">
                  <img
                    src="../assets/img/checkbox.svg"
                    class="unchecked"
                    alt=""
                  />
                  <img
                    src="../assets/img/checkboxHover.svg"
                    class="unchecked-hover"
                    alt=""
                  />
                  <img
                    src="../assets/img/checkboxChecked.svg"
                    class="checked"
                    alt=""
                  />
                  <img
                    src="../assets/img/checkboxCheckedHover.svg"
                    class="checked-hover"
                    alt=""
                  />
                </span>

                I accept the
                <a href="../html/privacy-policy.html">Privacy Policy</a>
              </label>
            </div>

            <!-- Message for the checkbox -->
            <div id="signupCheckedMsg">privacy policy must be accepted</div>

            <div class="button_container">
              <button
                id="submit_button"
                type="submit"
                onclick="signupRegistrationInFirebase()"
              >
                Sign up
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer id="sign-up-footer">
      <div class="footer_links">
        <a
          class="footer_links_PP_LN"
          href="../html/privacy-policy-officially.html"
          >Privacy Policy</a
        >
        <a
          class="footer_links_PP_LN"
          href="../html/legal-notice-officially.html"
          >Legal notice</a
        >
      </div>
    </footer>

    <!-- for the message when signup successfully-->
    <div class="message" id="message">
      <span>You Signed Up successfully</span>
    </div>
  </body>
  <script src="../script/sign-up-Script.js"></script>
  <script src="../script/sign-up-formValidation.js"></script>
  <script src="../script/sign-up-firebase.js"></script>
</html>
